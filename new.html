<!DOCTYPE html>
<html>
<head>
    <title>Smart Quiz</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .quiz-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .quiz-box {
            width: 500px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #timer {
            text-align: center;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        .question {
            font-size: 18px;
            margin-top: 15px;
            font-weight: 600;
        }

        .options label {
            display: block;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            background: #f1f1f1;
            cursor: pointer;
            transition: 0.3s;
        }

        .options label:hover {
            background: #dfe6ff;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        /* RESULT PAGE */
        #resultPage {
            display: none;
            text-align: center;
        }

        .correct {
            color: green;
        }

        .wrong {
            color: red;
        }
    </style>
</head>

<body>

<div class="quiz-container">

    <div class="quiz-box" id="quizPage">

        <div id="timer">Time: 60</div>

        <form id="quizForm">

            <div class="question">Q1. Capital of India?</div>
            <div class="options">
                <label><input type="radio" name="q1" value="Mumbai"> Mumbai</label>
                <label><input type="radio" name="q1" value="Delhi"> Delhi</label>
                <label><input type="radio" name="q1" value="Kolkata"> Kolkata</label>
            </div>

            <div class="question">Q2. 2 + 2 = ?</div>
            <div class="options">
                <label><input type="radio" name="q2" value="3"> 3</label>
                <label><input type="radio" name="q2" value="4"> 4</label>
                <label><input type="radio" name="q2" value="5"> 5</label>
            </div>

            <button type="button" onclick="submitQuiz()">Submit Quiz</button>

        </form>
    </div>

    <!-- RESULT -->
    <div class="quiz-box" id="resultPage">
        <h2>🎉 Result</h2>
        <p id="score"></p>
        <div id="analysis"></div>
    </div>

</div>

<script>
    let time = 60;
    let timer = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = "Time: " + time;

        if (time <= 0) {
            clearInterval(timer);
            submitQuiz();
        }
    }, 1000);

    function submitQuiz() {
        clearInterval(timer);

        let answers = {
            q1: "Delhi",
            q2: "4"
        };

        let score = 0;
        let analysisHTML = "";

        for (let key in answers) {
            let selected = document.querySelector(`input[name="${key}"]:checked`);

            if (selected) {
                if (selected.value === answers[key]) {
                    score++;
                    analysisHTML += `<p class="correct">${key} ✔ Correct</p>`;
                } else {
                    analysisHTML += `<p class="wrong">${key} ❌ Wrong</p>`;
                }
            } else {
                analysisHTML += `<p class="wrong">${key} ❌ Not Attempted</p>`;
            }
        }

        document.getElementById("quizPage").style.display = "none";
        document.getElementById("resultPage").style.display = "block";

        document.getElementById("score").innerText = "Score: " + score + "/2";
        document.getElementById("analysis").innerHTML = analysisHTML;
    }
</script>

</body>
</html>
